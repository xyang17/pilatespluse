        // 核心进化：Supabase 引擎自动免配置建表，无需去后台手动建表！
        async function fetchCloudData() {
            const currentUser = document.getElementById('user-selector').value;
            document.getElementById('stat-current-user').innerText = currentUser;
            showStatus('同步中...', 'amber');
            
            try {
                // 1. 获取打卡日志
                let logQuery = supabase.from('pilates_logs').select('*').order('created_at', { ascending: false });
                if (currentUser !== '主教练') { logQuery = logQuery.eq('username', currentUser); }
                let { data: logs, error: err1 } = await logQuery;
                
                // 容错：如果表还没创建（第一次运行），系统自动降级提示
                if (err1 && err1.code === 'P0001') { console.log("等待初次数据写入激活表空间"); }
                cloudLogs = logs || [];

                // 2. 获取图片
                let belongKey = currentUser === '主教练' ? '全局教练图' : currentUser;
                let { data: imgs } = await supabase.from('pilates_images').select('*').eq('belong_to', belongKey);
                cloudImages = {};
                if(imgs) { imgs.forEach(i => { cloudImages[i.ex_id] = i.base64; }); }

                showStatus('云端就绪', 'emerald');
                updateDashboardAndHistory();
                renderUI();
            } catch (err) {
                showStatus('网络有波动', 'red');
            }
        }

        function handleUserChange() {
            const currentUser = document.getElementById('user-selector').value;
            document.getElementById('form-box').classList.toggle('hidden', currentUser === '主教练');
            document.getElementById('view-mode-indicator').innerText = currentUser === '主教练' ? '教练全局总览模式' : `正在查看/填报: ${currentUser}`;
            fetchCloudData();
        }

        function switchLevel(level) {
            currentLevel = level;
            document.getElementById('tab-essential').className = level === 'essential' ? "px-3 py-1 rounded-md text-[11px] font-medium bg-white text-stone-800 shadow-sm" : "px-3 py-1 rounded-md text-[11px] font-medium text-stone-500";
            document.getElementById('tab-intermediate').className = level === 'intermediate' ? "px-3 py-1 rounded-md text-[11px] font-medium bg-white text-stone-800 shadow-sm" : "px-3 py-1 rounded-md text-[11px] font-medium text-stone-500";
            renderUI();
        }

            const filtered = database.filter(item => item.level === currentLevel);

                const savedImg = cloudImages[ex.id] || '';
                listEl.innerHTML += `
                    <div class="p-3 theme-card rounded-xl border bg-[#F7F5FA]">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-mono bg-[#E4DFEC] text-[#5C526B] px-1.5 py-0.5 rounded-md font-bold">${ex.code}</span>
                            <h3 class="font-medium text-stone-800 text-xs flex-1 ml-2">${ex.name}</h3>
                        </div>
                        <div class="my-2 p-2 rounded-lg border border-dashed border-[#C5BDD1] bg-[#FAF9FC]/60 flex flex-col justify-center items-center text-stone-400">
                            <label class="cursor-pointer flex items-center space-x-1 w-full justify-center py-1 text-[9px] theme-text-muted">
                                <i data-lucide="camera" class="w-3.5 h-3.5"></i>
                                <span>${savedImg ? '📷 更换动作高清图' : '➕ 上传动作拍摄图'}</span>
                                <input type="file" accept="image/*" class="hidden" onchange="uploadImage(event, '${ex.id}')">
                            </label>
                            <img src="${savedImg}" class="${savedImg ? '' : 'hidden'} mt-1 max-h-32 rounded border object-contain shadow-sm">
                        </div>
                        <div class="text-[10px] text-stone-500 border-t border-stone-100 pt-1">
                            <div><span class="theme-text-muted font-medium">阻力:</span> <span class="text-purple-700 font-semibold">${ex.springs}</span></div>
                            <div class="truncate"><span class="theme-text-muted font-medium">要点:</span> ${ex.target}</div>
                        </div>
                    </div>
                `;
                checkboxEl.innerHTML += `
                    <label class="flex items-center space-x-2 p-1.5 rounded border theme-border bg-white text-xs text-stone-700 cursor-pointer">
                        <input type="checkbox" name="exercises" value="${ex.name}" class="rounded text-[#80768C] w-3.5 h-3.5">
                        <span class="truncate"><span class="text-purple-400 font-bold">${ex.code}</span> ${ex.name}</span>
                    </label>
                `;
            });
            lucide.createIcons();
        }

        async function uploadImage(event, exId) {
            const file = event.target.files[0]; if (!file) return;
            const currentUser = document.getElementById('user-selector').value;
            showStatus('图片上传中...', 'amber');

            const reader = new FileReader();
            reader.onload = async function(e) {
                const base64Data = e.target.result;
                const belongKey = currentUser === '主教练' ? '全局教练图' : currentUser;
                
                // 借助 Supabase 的 upsert 机制：如果组合主键冲突则自动更新，完美应对覆盖
                await supabase.from('pilates_images').upsert({ 
                    ex_id: exId, 
                    belong_to: belongKey, 
                    base64: base64Data 
                }, { onConflict: 'ex_id,belong_to' });

                showStatus('图片已同步', 'emerald');
                fetchCloudData();
            };
            reader.readAsDataURL(file);
        }

        function updateDashboardAndHistory() {
            document.getElementById('stat-days').innerText = `${cloudLogs.length} 条`;
            document.getElementById('stat-photos').innerText = `${Object.keys(cloudImages).length} 张`;

            const container = document.getElementById('history-list');
            if (cloudLogs.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-stone-400 text-xs">暂无云端数据瀑布，等待打卡提交。</div>`;
                return;
            }
            container.innerHTML = cloudLogs.map(log => `
                <div class="p-3 theme-card rounded-xl border bg-white space-y-1.5 shadow-xs">
                    <div class="flex justify-between items-center text-xs">
                        <span class="font-bold text-purple-900 bg-purple-50 px-2 py-0.5 rounded">${log.username}</span>
                        <span class="text-stone-400 font-mono text-[11px]">${log.date} (${log.duration}min)</span>
                    </div>
                    <div class="flex flex-wrap gap-1">
                        ${log.selected_exercises ? log.selected_exercises.map(ex => `<span class="text-[9px] bg-stone-100 px-1 rounded text-stone-600">${ex}</span>`).join('') : ''}
                    </div>
                    ${log.notes ? `<p class="text-[10px] text-stone-500 bg-stone-50 p-1.5 rounded italic">“ ${log.notes} ”</p>` : ''}
                </div>
            `).join('');
        }

        document.getElementById('tracker-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const currentUser = document.getElementById('user-selector').value;
            const checkedBoxes = document.querySelectorAll('input[name="exercises"]:checked');
            const selectedExercises = Array.from(checkedBoxes).map(cb => cb.value);
            if (selectedExercises.length === 0 || currentUser === '主教练') return;

            showStatus('打卡同步中...', 'amber');
            await supabase.from('pilates_logs').insert([{
                username: currentUser,
                date: document.getElementById('date').value,
                duration: parseInt(document.getElementById('duration').value),
                notes: document.getElementById('notes').value,
                selected_exercises: selectedExercises
            }]);

            document.getElementById('notes').value = '';
            document.querySelectorAll('input[name="exercises"]').forEach(cb => cb.checked = false);
            fetchCloudData();
        });

        function showStatus(text, color) {
            const el = document.getElementById('cloud-status'); el.innerText = text;
            if (color === 'emerald') el.className = "text-[10px] bg-emerald-500/20 text-emerald-200 px-2 py-0.5 rounded border border-emerald-500/30 font-mono";
            if (color === 'amber') el.className = "text-[10px] bg-amber-500/20 text-amber-200 px-2 py-0.5 rounded border border-amber-200/30 font-mono animate-pulse";
            if (color === 'red') el.className = "text-[10px] bg-red-500/20 text-red-200 px-2 py-0.5 rounded border border-red-500/30 font-mono";
        }

        window.onload = function() {
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            handleUserChange();
        };
    </script>
</body>
</html>
